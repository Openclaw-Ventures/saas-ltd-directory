name: Nightly Rebuild

on:
  schedule:
    - cron: '0 2 * * *'  # 02:00 UTC daily
  workflow_dispatch:

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          pip install -r scrapers/requirements.txt
          playwright install chromium

      - name: Run scrapers
        run: cd scrapers && python run_all.py
        env:
          APPSUMO_IMPACT_ID: ${{ secrets.APPSUMO_IMPACT_ID }}
          PARTNERSTACK_KEY: ${{ secrets.PARTNERSTACK_KEY }}
          DEFAULT_REF: saasltddir

      - name: Generate Hugo content
        run: python generator/generate.py

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.123.7'
          extended: true

      - name: Build site
        run: cd site && hugo --minify

      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: './site/public'
          production-deploy: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
