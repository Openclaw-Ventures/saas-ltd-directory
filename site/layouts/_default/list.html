{{ define "main" }}
<section class="category-page">
  <h1>{{ .Title }}</h1>
  <p style="font-size: 14px; color: #6B7280; margin-bottom: 24px;">{{ len .Pages }} lifetime deals{{ with .Title }} in {{ . }}{{ end }} · Updated daily</p>
  {{ .Content }}
  <div class="grid">
    {{ $sorted := sort .Pages ".Params.discount_pct" "desc" }}
    {{ range $sorted }}
    {{ partial "product-card.html" . }}
    {{ end }}
  </div>
</section>
{{ end }}
