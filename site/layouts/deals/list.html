{{ define "main" }}
<section class="deals-list-page">
  <h1>All SaaS Lifetime Deals</h1>
  <p style="font-size: 14px; color: #6B7280; margin-bottom: 24px;">{{ len .Pages }} active deals · Prices verified daily · Sorted by best value</p>

  <div class="grid">
    {{ $sorted := sort .Pages ".Params.discount_pct" "desc" }}
    {{ range $sorted }}
    {{ partial "product-card.html" . }}
    {{ end }}
  </div>
</section>
{{ end }}
