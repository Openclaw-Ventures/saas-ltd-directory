{{ define "main" }}
<section class="deals-listing">
  <div class="listing-header">
    <h1>All SaaS Lifetime Deals</h1>
    <div class="listing-meta">
      <span class="listing-count">{{ len .Pages }} active deals</span>
      <span class="updated-badge">🔄 Updated daily</span>
    </div>
    <p>Prices verified daily. Sorted by best value.</p>
  </div>

  <div class="grid">
    {{ $sorted := sort .Pages ".Params.discount_pct" "desc" }}
    {{ range $sorted }}
    {{ partial "product-card.html" . }}
    {{ end }}
  </div>
</section>
{{ end }}
